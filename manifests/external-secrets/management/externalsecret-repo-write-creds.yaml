# Hydrator push credentials — materialised from the store of record.
# Replaces the imperative secret bootstrap.sh used to create.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: repo-write-platform-engineer-lab
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-store
  target:
    name: repo-write-platform-engineer-lab
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repo-write-creds
      data:
        url: https://github.com/platform-engineer-lab
        username: git
        password: "{{ .token }}"
  data:
    - secretKey: token
      remoteRef:
        key: platform-github-write-token
        property: token
