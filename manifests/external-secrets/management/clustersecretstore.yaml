# Store of record: the secret-store namespace on this (management) cluster.
# The namespace, eso-reader SA/RBAC/token, and the secret values themselves are
# created by platform-control-plane bootstrap.sh (credential plumbing, like
# spoke registration) — git owns only the declarative store definition.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: platform-store
spec:
  provider:
    kubernetes:
      remoteNamespace: secret-store
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: secret-store
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-reader
          namespace: secret-store
