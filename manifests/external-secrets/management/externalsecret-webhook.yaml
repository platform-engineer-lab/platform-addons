# GitHub webhook shared secret — merged into Argo CD's own argocd-secret
# (creationPolicy: Merge adds only this key; Argo CD keeps ownership).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-github-webhook-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: platform-store
  target:
    name: argocd-secret
    creationPolicy: Merge
  data:
    - secretKey: webhook.github.secret
      remoteRef:
        key: platform-github-webhook-secret
        property: secret
