# Reads the store of record on the management hub. The eso-reader-token secret
# (token + ca.crt of the management eso-reader SA) is placed in the
# external-secrets namespace by platform-control-plane bootstrap.sh.
# k3d-management-server-0 resolves via Docker DNS on the shared k3d-platform
# network and is stable across restarts (unlike container IPs).
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: platform-store
spec:
  provider:
    kubernetes:
      remoteNamespace: secret-store
      server:
        url: https://k3d-management-server-0:6443
        caProvider:
          type: Secret
          name: eso-reader-token
          namespace: external-secrets
          key: ca.crt
      auth:
        token:
          bearerToken:
            name: eso-reader-token
            namespace: external-secrets
            key: token
