apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Require resource limits
    policies.kyverno.io/description: >-
      Requires all containers and init containers to specify CPU and memory
      limits. Enforce mode — non-compliant Pods are rejected at admission.
spec:
  validationFailureAction: Enforce
  admission: true
  background: true
  rules:
    - name: check-container-limits
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - kyverno
                - argo-rollouts
                - envoy-gateway-system
                - cert-manager
                - argocd
                - promoter-system
      validate:
        message: "All containers must set resources.limits.cpu and resources.limits.memory."
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
    - name: check-initcontainer-limits
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - kyverno
                - argo-rollouts
                - envoy-gateway-system
                - cert-manager
                - argocd
                - promoter-system
      preconditions:
        all:
          # `|| []` guards pods without initContainers — a bare projection
          # errors on nil, which under Enforce would block the admission.
          - key: "{{ length(request.object.spec.initContainers || `[]`) }}"
            operator: GreaterThan
            value: 0
      validate:
        message: "All init containers must set resources.limits.cpu and resources.limits.memory."
        pattern:
          spec:
            initContainers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
