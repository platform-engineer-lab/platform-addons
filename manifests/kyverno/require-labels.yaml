apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-app-label
  annotations:
    policies.kyverno.io/title: Require app label
    policies.kyverno.io/description: >-
      Requires all Pods to carry an 'app' label. Audit mode — reports
      violations without blocking. Switch validationFailureAction to Enforce
      once existing workloads are labelled.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: check-for-app-label
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Pod must have an 'app' label."
        pattern:
          metadata:
            labels:
              app: "?*"
