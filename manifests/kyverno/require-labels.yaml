apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-app-label
  annotations:
    policies.kyverno.io/title: Require app label
    policies.kyverno.io/description: >-
      Requires all Pods to carry an 'app' or 'app.kubernetes.io/name' label.
      Enforce mode — unlabelled Pods are rejected at admission.
spec:
  validationFailureAction: Enforce
  admission: true
  background: true
  rules:
    - name: check-for-app-label
      skipBackgroundRequests: true
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-node-lease
                - kube-public
                - kyverno
                - argo-rollouts
                - envoy-gateway-system
                - cert-manager
                - argocd
                - promoter-system
      validate:
        message: "Pod must have an 'app' or 'app.kubernetes.io/name' label."
        anyPattern:
          - metadata:
              labels:
                app: "?*"
          - metadata:
              labels:
                app.kubernetes.io/name: "?*"
