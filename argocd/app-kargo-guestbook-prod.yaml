apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-guestbook-prod
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: guestbook:prod
spec:
  project: default
  source:
    repoURL: https://github.com/argoproj/argocd-example-apps.git
    targetRevision: HEAD
    path: guestbook
  destination:
    name: prod
    namespace: default
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
