apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-events
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchExpressions:
            - key: env
              operator: In
              values: [dev, prod]
  template:
    metadata:
      name: 'argo-events-{{name}}'
    spec:
      project: addons
      sources:
        - repoURL: https://argoproj.github.io/argo-helm
          chart: argo-events
          targetRevision: '2.4.22'
          helm:
            releaseName: argo-events
            valueFiles:
              - $values/addons/argo-events/values-base.yaml
              - $values/addons/argo-events/values-{{name}}.yaml
        - repoURL: https://github.com/platform-engineer-lab/platform-addons.git
          targetRevision: HEAD
          ref: values
      destination:
        server: '{{server}}'
        namespace: argo-events
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
