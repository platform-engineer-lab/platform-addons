apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kargo-guestbook-project
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: addons
  source:
    repoURL: https://github.com/platform-engineer-lab/platform-addons.git
    targetRevision: HEAD
    path: kargo/guestbook
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: guestbook
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
