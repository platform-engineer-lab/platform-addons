apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-addons
  source:
    repoURL: https://github.com/platform-engineer-lab/platform-addons
    targetRevision: main
    path: charts/envoy-gateway
    helm:
      releaseName: envoy-gateway
  destination:
    name: prod
    namespace: envoy-gateway-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 10
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
